<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Blue background with rounded corners -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6BBAE0"/>
      <stop offset="100%" stop-color="#4A94C2"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Lock body -->
  <rect x="19" y="34" width="26" height="20" rx="4" fill="#FFE600"/>
  <!-- Lock shackle -->
  <path d="M23 34v-9a9 9 0 0 1 18 0v9" fill="none" stroke="#FFE600" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Keyhole -->
  <circle cx="32" cy="43" r="3.5" fill="#4A94C2"/>
  <rect x="30.5" y="43" width="3" height="5" rx="1" fill="#4A94C2"/>
</svg>
